name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".release-please-manifest.json"
      - "meeting-tui/CHANGELOG.md"
      - "meeting-tui/pyproject.toml"
      - "meeting-tui/src/meeting_tui/__init__.py"
  pull_request:
    branches: ["main"]

jobs:
  full-ci:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get minimum Python version
        id: min-python
        run: |
          MIN_VER=$(grep -m 1 "^requires-python" meeting-tui/pyproject.toml | grep -oE "[0-9]+\.[0-9]+")
          echo "version=$MIN_VER" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.min-python.outputs.version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install PortAudio (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - name: Install PortAudio (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio

      - name: Install dependencies
        working-directory: meeting-tui
        run: uv sync --extra dev

      - name: Lint (ruff)
        working-directory: meeting-tui
        run: uv run ruff check src/

      - name: Format check (ruff)
        working-directory: meeting-tui
        run: uv run ruff format --check src/

      - name: Type check (mypy)
        working-directory: meeting-tui
        run: uv run mypy src/

      - name: Run tests
        working-directory: meeting-tui
        run: uv run pytest --cov=meeting_tui --cov-report=term-missing
