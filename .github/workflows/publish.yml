name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Required for Trusted Publishing
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        
      - name: Get minimum Python version
        id: min-python
        run: |
          MIN_VER=$(grep -m 1 "^requires-python" meeting-tui/pyproject.toml | grep -oE "[0-9]+\.[0-9]+")
          echo "version=$MIN_VER" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.min-python.outputs.version }}

      - name: Build sdist and wheel
        working-directory: meeting-tui
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: meeting-tui/dist/
